<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>APC Beta · Admin</title>
<meta name="theme-color" content="#0f3d2e" />
<link rel="icon" type="image/png" sizes="32x32" href="https://daven1998.github.io/apc-preview/img/favicon-32.png" />
<link rel="stylesheet" href="./style.css" />
<style>
  .admin-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 14px 0 18px;
  }
  .stat {
    background: var(--apc-card);
    border: 1px solid var(--apc-border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-val { font-size: 28px; font-weight: 800; color: var(--apc-green); }
  .stat-lbl { font-size: 13px; color: var(--apc-muted); margin-top: 4px; }

  table.admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
  }
  table.admin-table th, table.admin-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--apc-border);
    text-align: left;
    vertical-align: top;
  }
  table.admin-table th { background: #f1f0e9; color: var(--apc-green); font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; }
  table.admin-table tr:last-child td { border-bottom: none; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .pill-progress { background: #fff4e0; color: #c77700; }
  .pill-completed { background: #e6f4ea; color: #2e7d32; }
  .pill-started { background: #e8f1ee; color: var(--apc-green); }
  .scroll-x { overflow-x: auto; }
  .funnel { display: flex; gap: 6px; margin: 14px 0; align-items: flex-end; height: 140px; }
  .funnel .bar { flex: 1; background: var(--apc-green-2); border-radius: 8px 8px 0 0; position: relative; min-height: 4px; }
  .funnel .bar span { position: absolute; top: -22px; left: 0; right: 0; text-align: center; font-size: 13px; font-weight: 600; }
  .funnel .bar small { position: absolute; bottom: -22px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--apc-muted); }
</style>
</head>
<body>

<div class="beta-banner"><strong>BETA TEST MODE</strong> — Admin dashboard · APC team only</div>

<header class="apc-header">
  <a href="./" class="apc-brand">
    <img src="https://daven1998.github.io/apc-preview/img/apc-logo.png" alt="APC" class="apc-logo" />
    <span class="apc-brand-text">APC <span class="apc-brand-sub">Beta admin</span></span>
  </a>
  <div class="apc-header-right" id="header-right">
    <a href="whatsapp.html" style="margin-right:14px; font-size:13px; color:#006633; text-decoration:none; font-weight:600;">WhatsApp · Platform v1.0</a>
  </div>
</header>

<main class="apc-main" id="apc-main" style="max-width:1100px">
  <div class="loading" id="loading-screen">Loading…</div>
</main>

<footer class="apc-footer">
  <div>APC admin · Beta build · Test data only</div>
  <div class="apc-build">Beta Build v0.5.2</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./config.js?v=0.5.2-implicit"></script>
<script>
(function () {
  const sb = window.supabaseClient;
  const cfg = window.APC_CONFIG;
  const STEPS = ["Welcome","Confirm area","Your property","Compliance check","Documents","Summary","Feedback","Complete"];
  const $ = (s) => document.querySelector(s);
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

  function showSpinner() {
    $("#apc-main").innerHTML = `
      <div class="card" style="text-align:center;padding:48px 24px;">
        <div style="font-size:28px;margin-bottom:8px;">🔑</div>
        <h1 style="margin:0 0 8px 0;">Signing you in…</h1>
        <p class="muted">One moment.</p>
      </div>`;
  }

  async function gateAndLoad() {
    // If URL has magic-link payload, wait for it to be exchanged before deciding.
    const urlHasAuth =
      /[?&]code=/.test(window.location.search) ||
      /access_token=|refresh_token=|type=magiclink/.test(window.location.hash);
    if (urlHasAuth) {
      showSpinner();
      const start = Date.now();
      while (Date.now() - start < 8000) {
        const { data: { session: s } } = await sb.auth.getSession();
        if (s) break;
        await new Promise(r => setTimeout(r, 250));
      }
      try { window.history.replaceState({}, document.title, window.location.pathname); } catch (e) {}
    }

    const { data: { session } } = await sb.auth.getSession();
    if (!session) return showSignIn();
    if (!cfg.ADMIN_EMAILS.includes(session.user.email)) return showDenied(session.user.email);
    $("#header-right").innerHTML = `<a href="whatsapp.html" style="margin-right:14px; font-size:13px; color:#006633; text-decoration:none; font-weight:600;">WhatsApp · Platform v1.0</a><span style="margin-right:10px">${esc(session.user.email)}</span><button class="logout" id="btn-logout">Sign out</button>`;
    $("#btn-logout").onclick = async () => { await sb.auth.signOut(); window.location.reload(); };
    await loadDashboard();
  }

  function showSignIn() {
    $("#apc-main").innerHTML = `
      <div class="card">
        <h1>Admin sign-in</h1>
        <p class="muted">Enter your APC admin email. We'll email you a <strong>6-digit code</strong> — paste it below.</p>
        <label>Email</label>
        <input type="email" id="email" placeholder="you@algarvepropertycompliance.com" />
        <button class="btn btn-primary" id="btn-send">Send me my 6-digit code</button>
        <div id="msg"></div>
        <div id="otp-box" style="display:none;margin-top:18px;padding-top:18px;border-top:1px solid #E5E3DC;">
          <label for="otp">Paste the 6-digit code</label>
          <input type="text" id="otp" inputmode="numeric" autocomplete="one-time-code"
                 pattern="[0-9]{6}" maxlength="6" placeholder="123456"
                 style="font-size:24px;letter-spacing:6px;text-align:center;font-family:monospace;" />
          <button class="btn btn-primary" id="btn-verify">Verify and sign in</button>
          <p class="muted" style="font-size:12px;margin-top:8px;">Or tap the link in the same email — either works.</p>
        </div>
      </div>`;

    let sentEmail = null;
    async function sendCode(em) {
      $("#btn-send").disabled = true;
      $("#btn-send").textContent = "Sending…";
      const { error } = await sb.auth.signInWithOtp({ email: em, options: { emailRedirectTo: cfg.REDIRECT_URL } });
      if (error) {
        $("#msg").innerHTML = `<div class="alert alert-bad">${esc(error.message)}</div>`;
        $("#btn-send").disabled = false; $("#btn-send").textContent = "Send me my 6-digit code";
        return;
      }
      sentEmail = em;
      $("#msg").innerHTML = `<div class="alert alert-ok"><strong>Sent.</strong> Check ${esc(em)} for a 6-digit code.</div>`;
      $("#btn-send").disabled = false; $("#btn-send").textContent = "Code sent ✓ (resend)";
      $("#otp-box").style.display = "block";
      setTimeout(() => { try { $("#otp").focus(); } catch(e){} }, 100);
    }

    $("#btn-send").onclick = async () => {
      const email = $("#email").value.trim().toLowerCase();
      if (!cfg.ADMIN_EMAILS.includes(email)) {
        $("#msg").innerHTML = `<div class="alert alert-bad">That email isn't on the admin list.</div>`; return;
      }
      await sendCode(email);
    };
    $("#btn-verify").onclick = async () => {
      if (!sentEmail) return;
      const token = $("#otp").value.trim();
      if (!/^\d{6}$/.test(token)) { $("#msg").innerHTML = `<div class="alert alert-bad">Enter the 6-digit code.</div>`; return; }
      $("#btn-verify").disabled = true; $("#btn-verify").textContent = "Checking…";
      const { error } = await sb.auth.verifyOtp({ email: sentEmail, token, type: "email" });
      if (error) {
        $("#msg").innerHTML = `<div class="alert alert-bad">${esc(error.message)}</div>`;
        $("#btn-verify").disabled = false; $("#btn-verify").textContent = "Verify and sign in";
        return;
      }
      showSpinner();
    };
  }
  function showDenied(email) {
    $("#apc-main").innerHTML = `
      <div class="card">
        <h1>Not an admin account</h1>
        <p>You're signed in as <strong>${esc(email)}</strong>, which isn't on the APC admin list.</p>
        <button class="btn btn-secondary" id="btn-out">Sign out</button>
      </div>`;
    $("#btn-out").onclick = async () => { await sb.auth.signOut(); window.location.reload(); };
  }

  // ---------- CSV helpers ----------
  function toCSV(rows, columns) {
    if (!rows.length) return columns.join(",") + "\n";
    const header = columns.join(",");
    const body = rows.map(r => columns.map(c => {
      let v = r[c];
      if (v == null) return "";
      if (typeof v === "object") v = JSON.stringify(v);
      v = String(v).replace(/"/g, '""');
      if (/[",\n]/.test(v)) v = `"${v}"`;
      return v;
    }).join(",")).join("\n");
    return header + "\n" + body + "\n";
  }
  function downloadCSV(filename, csv) {
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
  }
  function todayStr() {
    const d = new Date();
    return d.toISOString().slice(0,10);
  }

  async function loadDashboard() {
    const [overviewQ, fbkQ, sessQ, appsQ, testersQ] = await Promise.all([
      sb.from("v_admin_overview").select("*").order("created_at", { ascending: false }),
      sb.from("beta_feedback").select("*").order("submitted_at", { ascending: false }),
      sb.from("session_tracking").select("current_step, event_type, time_on_step_ms, tester_id, extra, device_info"),
      sb.from("beta_applications").select("*"),
      sb.from("testers").select("*")
    ]);
    if (overviewQ.error) { console.error(overviewQ.error); }
    const overview = overviewQ.data || [];
    const feedback = fbkQ.data || [];
    const sessions = sessQ.data || [];
    const apps = appsQ.data || [];
    const testers = testersQ.data || [];
    const testerById = Object.fromEntries(testers.map(t => [t.id, t]));

    // Friction stats
    const totalBacks   = sessions.reduce((s, x) => s + ((x.extra && x.extra.back_clicks) || 0), 0);
    const totalRetries = sessions.reduce((s, x) => s + ((x.extra && x.extra.upload_retries) || 0), 0);
    const totalFailures = sessions.reduce((s, x) => s + ((x.extra && x.extra.upload_failures) || 0), 0);
    const totalRageClicks = sessions.reduce((s, x) => s + ((x.extra && x.extra.rage_clicks) || 0), 0);
    const abandoned = sessions.filter(x => x.event_type === "application_abandoned").length;

    // Device split
    const devCounts = { ios_safari: 0, other: 0 };
    testers.forEach(t => {
      if (t.device_info && t.device_info.is_ios_safari) devCounts.ios_safari++;
      else devCounts.other++;
    });

    // KPIs
    const totalTesters = overview.length;
    const completed = overview.filter(r => r.onboarding_status === "completed" || (r.completion_percent||0) >= 100).length;
    const inProgress = totalTesters - completed;
    const avgClarity = avg(feedback.map(f => f.clarity_score));
    const avgEase    = avg(feedback.map(f => f.ease_score));
    const avgTrust   = avg(feedback.map(f => f.trust_score));
    const avgTimeSec = avg(sessions.filter(s => s.time_on_step_ms).map(s => s.time_on_step_ms/1000));

    // Funnel: how many testers reached step N (based on last_step_completed)
    const funnel = STEPS.map((name, i) => {
      const step = i + 1;
      const count = overview.filter(r => (r.last_step_completed||0) >= step - 1).length;
      return { step, name, count };
    });
    const funnelMax = Math.max(1, ...funnel.map(f => f.count));

    $("#apc-main").innerHTML = `
      <div class="card">
        <h2>Beta overview</h2>
        <div class="admin-stats">
          <div class="stat"><div class="stat-val">${totalTesters}</div><div class="stat-lbl">Testers</div></div>
          <div class="stat"><div class="stat-val">${completed}</div><div class="stat-lbl">Completed flow</div></div>
          <div class="stat"><div class="stat-val">${inProgress}</div><div class="stat-lbl">In progress</div></div>
          <div class="stat"><div class="stat-val">${fmt(avgClarity)}</div><div class="stat-lbl">Avg clarity /5</div></div>
          <div class="stat"><div class="stat-val">${fmt(avgEase)}</div><div class="stat-lbl">Avg ease /5</div></div>
          <div class="stat"><div class="stat-val">${fmt(avgTrust)}</div><div class="stat-lbl">Avg trust /5</div></div>
          <div class="stat"><div class="stat-val">${fmt(avgTimeSec,0)}s</div><div class="stat-lbl">Avg time / step</div></div>
        </div>
        <div class="btn-row" style="margin-top:8px">
          <button class="btn btn-secondary" id="csv-testers">Export testers CSV</button>
          <button class="btn btn-secondary" id="csv-apps">Export applications CSV</button>
          <button class="btn btn-secondary" id="csv-feedback">Export feedback CSV</button>
        </div>
      </div>

      <div class="card">
        <h2>Friction signals</h2>
        <div class="admin-stats">
          <div class="stat"><div class="stat-val">${totalBacks}</div><div class="stat-lbl">Back clicks</div></div>
          <div class="stat"><div class="stat-val">${totalRetries}</div><div class="stat-lbl">Upload retries</div></div>
          <div class="stat"><div class="stat-val">${totalFailures}</div><div class="stat-lbl">Upload failures</div></div>
          <div class="stat"><div class="stat-val">${totalRageClicks}</div><div class="stat-lbl">Rage clicks</div></div>
          <div class="stat"><div class="stat-val">${abandoned}</div><div class="stat-lbl">Abandoned sessions</div></div>
          <div class="stat"><div class="stat-val">${devCounts.ios_safari}/${devCounts.ios_safari + devCounts.other}</div><div class="stat-lbl">iOS Safari users</div></div>
        </div>
      </div>

      <div class="card">
        <h2>Compliance routing</h2>
        ${renderComplianceRoutingAdmin(apps, testers)}
      </div>

      <div class="card">
        <h2>Document uploads</h2>
        ${renderUploadAdmin(apps, testers)}
      </div>

      <div class="card">
        <h2>APC chase queue</h2>
        ${renderChaseQueueAdmin(apps, testers)}
      </div>

      <div class="card">
        <h2>Step funnel</h2>
        <p class="muted">How many testers reached each step.</p>
        <div class="funnel" style="margin-top:30px;margin-bottom:30px">
          ${funnel.map(f => `
            <div class="bar" style="height:${Math.round((f.count/funnelMax)*100)}%">
              <span>${f.count}</span>
              <small>${f.step}. ${esc(f.name)}</small>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="card">
        <h2>Testers</h2>
        <div class="scroll-x">
          <table class="admin-table">
            <thead><tr>
              <th>Name</th><th>Email</th><th>Area</th><th>Status</th>
              <th>Progress</th><th>Last step</th>
              <th>Property</th><th>Device</th><th>Joined</th><th>Admin notes</th>
            </tr></thead>
            <tbody>
              ${overview.map(r => {
                const tester = testerById[r.tester_id] || {};
                const di = tester.device_info || {};
                const devLbl = di.is_ios_safari ? "iOS Safari" : (di.platform || "—");
                return `
                <tr>
                  <td>${esc(r.full_name)}</td>
                  <td>${esc(r.email)}</td>
                  <td>${esc(r.algarve_area || "—")}</td>
                  <td>${statusPill(r)}</td>
                  <td>${r.completion_percent || 0}%</td>
                  <td>${(r.last_step_completed || 0)} of ${STEPS.length-1}</td>
                  <td>${esc(r.generated_property_town || "—")} · ${esc(r.generated_property_type || "")}</td>
                  <td title="${esc(di.ua||"")}">${esc(devLbl)}</td>
                  <td>${fmtDate(r.created_at)}</td>
                  <td>
                    <textarea data-tester="${r.tester_id}" class="admin-note" rows="2"
                      style="width:160px;min-height:50px;font-size:13px;padding:6px"
                      placeholder="Notes…">${esc(tester.admin_notes||"")}</textarea>
                  </td>
                </tr>`;
              }).join("") || `<tr><td colspan="10" style="text-align:center;color:var(--apc-muted);padding:18px">No testers yet</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Feedback (${feedback.length})</h2>
        <div class="scroll-x">
          <table class="admin-table">
            <thead><tr>
              <th>When</th><th>Clarity</th><th>Ease</th><th>Trust</th>
              <th>What confused them</th><th>What would help</th><th>Would pay?</th>
            </tr></thead>
            <tbody>
              ${feedback.map(f => `
                <tr>
                  <td>${fmtDate(f.submitted_at)}</td>
                  <td>${f.clarity_score ?? "—"}</td>
                  <td>${f.ease_score ?? "—"}</td>
                  <td>${f.trust_score ?? "—"}</td>
                  <td>${esc(f.confusion_notes || "")}</td>
                  <td>${esc(f.improvement_text || "")}</td>
                  <td>${esc(f.would_pay_text || "")}</td>
                </tr>
              `).join("") || `<tr><td colspan="7" style="text-align:center;color:var(--apc-muted);padding:18px">No feedback yet</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;

    // CSV export wiring
    $("#csv-testers").onclick = () => downloadCSV(
      `apc-beta-testers-${todayStr()}.csv`,
      toCSV(testers, ["id","email","full_name","algarve_area","onboarding_status","completion_percent","last_step_completed","feedback_score","admin_notes","device_info","last_seen_at","created_at"])
    );
    $("#csv-apps").onclick = () => downloadCSV(
      `apc-beta-applications-${todayStr()}.csv`,
      toCSV(apps, ["id","tester_id","status","application_progress","generated_property_town","generated_property_type","generated_bedrooms","generated_capacity","generated_risk_score","guest_capacity_band","compliance_path","manual_review_required","scie_flag","scie_details","doc_status_records","uploaded_docs_count","pending_docs_count","missing_docs_count","provisional_compliance","apc_chase_required","final_compliance_score","final_compliance_band","compliance_answers","uploaded_documents","feedback_data","created_at","completed_at"])
    );
    $("#csv-feedback").onclick = () => downloadCSV(
      `apc-beta-feedback-${todayStr()}.csv`,
      toCSV(feedback, ["id","tester_id","application_id","clarity_score","ease_score","trust_score","confusion_notes","improvement_text","would_pay_text","bugs_found","submitted_at"])
    );

    // Admin-notes inline save on blur (debounced per textarea)
    document.querySelectorAll("textarea.admin-note").forEach(ta => {
      let timer = null;
      ta.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(async () => {
          const id = ta.dataset.tester;
          await sb.from("testers").update({ admin_notes: ta.value }).eq("id", id);
          ta.style.borderColor = "#2e7d32";
          setTimeout(() => ta.style.borderColor = "", 600);
        }, 800);
      });
    });
  }

  // Document slot definitions (mirror app.js v0.4.3)
  const DOC_SLOTS_ADMIN = [
    { slot: "passport_id",          title: "Passport / Government ID" },
    { slot: "nif",                  title: "NIF — Portuguese Fiscal Number" },
    { slot: "iban_bank",            title: "IBAN / Bank Proof" },
    { slot: "fiscal_rep",           title: "Fiscal Representative Appointment" },
    { slot: "property_ownership",   title: "Property Ownership Deed (Escritura)" },
    { slot: "caderneta_predial",    title: "Caderneta Predial Urbana" },
    { slot: "licenca_utilizacao",   title: "Licença de Utilização" },
    { slot: "floor_plan",           title: "Floor Plan / Property Layout" },
    { slot: "al_licence",           title: "Existing AL Licence (RNAL)" },
    { slot: "inicio_atividade",     title: "Início de Atividade (CAE 55204)" },
    { slot: "energy_certificate",   title: "Energy Certificate (DGEG)" },
    { slot: "gas_safety",           title: "Gas Safety Certificate" },
    { slot: "electrical_safety",    title: "Electrical Safety Certificate" },
    { slot: "fire_safety",          title: "Fire Safety Documentation" },
    { slot: "insurance",            title: "Property & Public Liability Insurance" },
    { slot: "livro_reclamacoes",    title: "Livro de Reclamações Registration" }
  ];

  // ---------- v0.4.1 — Compliance routing card ----------
  function renderComplianceRoutingAdmin(apps, testers) {
    const testerById = Object.fromEntries((testers||[]).map(t => [t.id, t]));
    const total = apps.length;
    const counts = { unset: 0, "1_4": 0, "5_10": 0, "11_plus": 0 };
    const paths  = { standard_AL: 0, SCIE_review: 0, unset: 0 };
    let manualReview = 0;
    apps.forEach(a => {
      const b = a.guest_capacity_band || "unset";
      counts[b] = (counts[b]||0) + 1;
      const p = a.compliance_path || "unset";
      paths[p] = (paths[p]||0) + 1;
      if (a.manual_review_required) manualReview++;
    });
    const stats = `
      <div class="admin-stats">
        <div class="stat"><div class="stat-val">${counts["1_4"]}</div><div class="stat-lbl">1–4 guests</div></div>
        <div class="stat"><div class="stat-val">${counts["5_10"]}</div><div class="stat-lbl">5–10 guests</div></div>
        <div class="stat"><div class="stat-val">${counts["11_plus"]}</div><div class="stat-lbl">11+ guests</div></div>
        <div class="stat"><div class="stat-val">${counts.unset}</div><div class="stat-lbl">Not yet classified</div></div>
        <div class="stat"><div class="stat-val">${paths.standard_AL}</div><div class="stat-lbl">Standard AL</div></div>
        <div class="stat"><div class="stat-val">${paths.SCIE_review}</div><div class="stat-lbl">SCIE review</div></div>
        <div class="stat"><div class="stat-val">${manualReview}</div><div class="stat-lbl">Manual review flag</div></div>
      </div>`;
    const rows = apps
      .slice()
      .sort((a,b) => (b.scie_flag?1:0) - (a.scie_flag?1:0))
      .map(a => {
        const t = testerById[a.tester_id] || {};
        const band = a.guest_capacity_band || "—";
        const bandLabel = ({"1_4":"1–4","5_10":"5–10","11_plus":"11+"})[band] || "—";
        const pathLabel = a.compliance_path === "SCIE_review"
          ? '<span class="adm-badge adm-badge-scie">SCIE review</span>'
          : (a.compliance_path === "standard_AL"
              ? '<span class="adm-badge adm-badge-std">Standard AL</span>'
              : '<span class="adm-badge adm-badge-cap">Not set</span>');
        const mr = a.manual_review_required ? '<span class="adm-badge adm-badge-scie">YES</span>' : '<span class="muted">no</span>';
        const scieD = (a.scie_details && Object.keys(a.scie_details).length)
          ? `${a.scie_details.floors||"?"} fl · ${a.scie_details.floor_area_sqm||"?"} m² · ${a.scie_details.existing_extinguisher_count??"?"} ext`
          : '<span class="muted">—</span>';
        return `<tr data-path="${a.compliance_path||"unset"}">
          <td>${esc(t.full_name || t.email || a.tester_id.slice(0,8))}</td>
          <td><span class="adm-badge adm-badge-cap">${bandLabel}</span></td>
          <td>${pathLabel}</td>
          <td>${mr}</td>
          <td>${scieD}</td>
        </tr>`;
      }).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--apc-muted);padding:14px">No applications yet</td></tr>`;
    const filter = `
      <div class="adm-filter-row">
        <label>Filter:
          <select id="adm-routing-filter">
            <option value="all">All applications</option>
            <option value="standard_AL">Standard AL only</option>
            <option value="SCIE_review">SCIE review only</option>
            <option value="unset">Not yet classified</option>
          </select>
        </label>
      </div>`;
    setTimeout(() => {
      const sel = document.getElementById("adm-routing-filter");
      if (sel) sel.onchange = () => {
        const v = sel.value;
        document.querySelectorAll("#adm-routing-table tbody tr[data-path]").forEach(tr => {
          tr.style.display = (v === "all" || tr.getAttribute("data-path") === v) ? "" : "none";
        });
      };
    }, 0);
    return `${stats}
      ${filter}
      <table id="adm-routing-table" class="admin-table">
        <thead><tr><th>Tester</th><th>Capacity</th><th>Path</th><th>Manual review</th><th>SCIE details</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ---------- v0.4.2 — APC chase queue (per-doc-status) ----------
  function renderChaseQueueAdmin(apps, testers) {
    const testerById = Object.fromEntries((testers||[]).map(t => [t.id, t]));
    const REASON_LABELS = {
      previous_owner:  "Previous owner has it",
      professional:    "Accountant / lawyer",
      request_council: "Need to request from council",
      never_issued:    "Never received one",
      unsure_exists:   "Not sure if it exists",
      will_upload:     "Will upload later",
      other:           "Other"
    };

    // Roll-up totals
    let upl=0, pen=0, mis=0, prov=0, chase=0;
    const reasonCounts = {};
    const chaseRows = [];
    apps.forEach(a => {
      upl += a.uploaded_docs_count || 0;
      pen += a.pending_docs_count  || 0;
      mis += a.missing_docs_count  || 0;
      if (a.provisional_compliance) prov++;
      if (a.apc_chase_required)     chase++;
      const recs = a.doc_status_records || {};
      DOC_SLOTS_ADMIN.forEach(d => {
        const r = recs[d.slot] || {};
        const filesForSlot = (a.uploaded_documents||[]).filter(it => it.slot === d.slot);
        if (filesForSlot.length > 0) return; // uploaded, not a chase item
        if (r.status === "missing" || r.status === "pending") {
          if (r.status === "missing" && r.reason_code) {
            reasonCounts[r.reason_code] = (reasonCounts[r.reason_code]||0) + 1;
          }
          const t = testerById[a.tester_id] || {};
          chaseRows.push({
            tester: t.full_name || t.email || a.tester_id.slice(0,8),
            email:  t.email || "",
            doc:    d.title,
            slot:   d.slot,
            status: r.status,
            reason: r.status === "missing" ? (REASON_LABELS[r.reason_code] || "—") : "—",
            reason_other: r.reason_text || "",
            updated_at: r.updated_at
          });
        }
      });
    });
    chaseRows.sort((a,b) => (b.updated_at||"").localeCompare(a.updated_at||""));

    const stats = `
      <div class="admin-stats">
        <div class="stat"><div class="stat-val">${upl}</div><div class="stat-lbl">Docs uploaded</div></div>
        <div class="stat"><div class="stat-val">${pen}</div><div class="stat-lbl">Pending upload</div></div>
        <div class="stat"><div class="stat-val">${mis}</div><div class="stat-lbl">APC follow-up</div></div>
        <div class="stat"><div class="stat-val">${chase}</div><div class="stat-lbl">Apps needing chase</div></div>
        <div class="stat"><div class="stat-val">${prov}</div><div class="stat-lbl">Provisional status</div></div>
      </div>`;

    const reasonBreakdown = Object.keys(reasonCounts).length ? `
      <div style="margin:14px 0 10px 0;font-size:13px;color:#2a3142">
        <strong>Missing-doc reasons:</strong>
        ${Object.entries(reasonCounts).map(([code,c]) => `<span class="adm-badge adm-badge-cap" style="margin:0 6px 6px 0;display:inline-block">${esc(REASON_LABELS[code]||code)}: ${c}</span>`).join("")}
      </div>` : "";

    const filter = `
      <div class="adm-filter-row">
        <label>Status filter:
          <select id="adm-chase-filter">
            <option value="all">All chase items</option>
            <option value="missing">APC follow-up (missing)</option>
            <option value="pending">Pending upload only</option>
          </select>
        </label>
      </div>`;

    const rowsHTML = chaseRows.length ? chaseRows.map(r => {
      const statusBadge = r.status === "missing"
        ? '<span class="adm-badge adm-badge-scie">APC follow-up</span>'
        : '<span class="adm-badge adm-badge-cap">Pending</span>';
      return `<tr data-status="${r.status}">
        <td>${esc(r.tester)}</td>
        <td>${esc(r.doc)}</td>
        <td>${statusBadge}</td>
        <td>${esc(r.reason)}${r.reason_other ? ` — “${esc(r.reason_other)}”` : ""}</td>
        <td>${r.updated_at ? fmtDate(r.updated_at) : "—"}</td>
      </tr>`;
    }).join("") : `<tr><td colspan="5" style="text-align:center;color:var(--apc-muted);padding:14px">No chase items yet — the queue is clear.</td></tr>`;

    setTimeout(() => {
      const sel = document.getElementById("adm-chase-filter");
      if (sel) sel.onchange = () => {
        const v = sel.value;
        document.querySelectorAll("#adm-chase-table tbody tr[data-status]").forEach(tr => {
          tr.style.display = (v === "all" || tr.getAttribute("data-status") === v) ? "" : "none";
        });
      };
    }, 0);

    return `${stats}
      ${reasonBreakdown}
      ${filter}
      <table id="adm-chase-table" class="admin-table">
        <thead><tr><th>Tester</th><th>Document</th><th>Status</th><th>Reason</th><th>Last updated</th></tr></thead>
        <tbody>${rowsHTML}</tbody>
      </table>`;
  }

  function renderUploadAdmin(apps, testers) {
    const testerById = Object.fromEntries(testers.map(t => [t.id, t]));
    const totalApps = apps.length;
    // Aggregate per slot
    const slotCounts = {};
    DOC_SLOTS_ADMIN.forEach(s => slotCounts[s.slot] = 0);
    let totalAdditional = 0;
    const additionalLabels = [];
    apps.forEach(a => {
      const docs = a.uploaded_documents || [];
      const seen = new Set();
      docs.forEach(d => {
        const slot = d.slot || "_legacy";
        if (slot === "additional") {
          totalAdditional++;
          if (d.label) additionalLabels.push({ label: d.label, tester: testerById[a.tester_id], when: d.uploaded_at });
        } else if (slotCounts.hasOwnProperty(slot) && !seen.has(slot)) {
          slotCounts[slot]++;
          seen.add(slot);
        }
      });
    });

    const aggTable = DOC_SLOTS_ADMIN.map(s => {
      const have = slotCounts[s.slot];
      const missing = totalApps - have;
      return `<tr><td>${esc(s.title)}</td><td>${have} / ${totalApps}</td><td>${missing}</td></tr>`;
    }).join("");

    const additionalListHTML = additionalLabels.length
      ? `<ul style="margin:6px 0 0;padding-left:18px">${additionalLabels.map(a => `<li>${esc(a.label)} <span class="muted">— ${esc((a.tester && a.tester.email) || "unknown")} · ${fmtDate(a.when)}</span></li>`).join("")}</ul>`
      : `<p class="muted" style="margin:6px 0 0">No additional documents uploaded yet.</p>`;

    const perTester = apps.map(a => {
      const t = testerById[a.tester_id] || {};
      const docs = a.uploaded_documents || [];
      const slotMap = {};
      docs.forEach(d => { slotMap[d.slot || "_legacy"] = d; });
      const slotCells = DOC_SLOTS_ADMIN.map(s => slotMap[s.slot] ? `<span class="pill pill-completed" title="${esc(slotMap[s.slot].name)}">✓</span>` : `<span class="pill pill-started">—</span>`).join(" ");
      const addCount = docs.filter(d => d.slot === "additional").length;
      return `<tr><td>${esc(t.full_name || t.email || "?")}</td><td>${slotCells}</td><td>${addCount}</td></tr>`;
    }).join("") || `<tr><td colspan="3" style="text-align:center;color:var(--apc-muted);padding:14px">No applications yet</td></tr>`;

    return `
      <p class="muted">Uploads grouped by document category. Counts show how many testers have uploaded each category.</p>
      <div class="scroll-x" style="margin-top:8px">
        <table class="admin-table">
          <thead><tr><th>Category</th><th>Uploaded</th><th>Missing</th></tr></thead>
          <tbody>${aggTable}</tbody>
        </table>
      </div>
      <h3 style="margin-top:16px;font-size:15px;color:var(--apc-green)">Additional documents (${totalAdditional})</h3>
      ${additionalListHTML}
      <h3 style="margin-top:16px;font-size:15px;color:var(--apc-green)">Per-tester breakdown</h3>
      <div class="scroll-x">
        <table class="admin-table">
          <thead><tr><th>Tester</th><th>${DOC_SLOTS_ADMIN.map(s => `<span title=\"${esc(s.title)}\">${esc(s.title.split(/\s/)[0])}</span>`).join("</th><th>")}</th><th>+Extras</th></tr></thead>
          <tbody>${perTester}</tbody>
        </table>
      </div>
    `;
  }

  function statusPill(r) {
    if ((r.completion_percent||0) >= 100 || r.onboarding_status === "completed")
      return `<span class="pill pill-completed">Completed</span>`;
    if ((r.last_step_completed||0) > 0)
      return `<span class="pill pill-progress">In progress</span>`;
    return `<span class="pill pill-started">Started</span>`;
  }
  function avg(arr){ const xs = arr.filter(v => v != null && !isNaN(v)); if (!xs.length) return null; return xs.reduce((a,b)=>a+Number(b),0)/xs.length; }
  function fmt(v, d=1){ return v == null ? "—" : Number(v).toFixed(d); }
  function fmtDate(s){ if (!s) return "—"; const d = new Date(s); return d.toLocaleString("en-GB", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" }); }

  sb.auth.onAuthStateChange((_e, sess) => { if (sess) gateAndLoad(); });
  gateAndLoad();
})();
</script>
