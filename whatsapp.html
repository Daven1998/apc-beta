<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WhatsApp · APC Admin</title>
<link rel="stylesheet" href="style.css">
<style>
  :root { --apc-green: #006633; --apc-gold: #FFCC00; --apc-red: #D90708; --apc-ink: #0A1F14; --apc-stone-50: #F7F6F2; --apc-stone-200: #E5E3DC; --apc-stone-600: #5C5A52; }
  body { background: var(--apc-stone-50); color: var(--apc-ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; margin: 0; }
  .wa-bar { background: var(--apc-green); color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .wa-bar h1 { font-size: 17px; margin: 0; font-weight: 600; }
  .wa-bar .right a { color: #fff; opacity: 0.85; text-decoration: none; font-size: 14px; margin-left: 16px; }
  .wa-bar .right a:hover { opacity: 1; }
  .wa-bar .badge { background: var(--apc-gold); color: var(--apc-ink); border-radius: 12px; padding: 2px 10px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .wa-wrap { max-width: 1200px; margin: 0 auto; padding: 22px 20px; }
  .wa-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .wa-stat { background: #fff; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--apc-stone-200); }
  .wa-stat .num { font-size: 24px; font-weight: 700; color: var(--apc-green); }
  .wa-stat .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--apc-stone-600); margin-top: 4px; }
  .wa-card { background: #fff; border-radius: 8px; border: 1px solid var(--apc-stone-200); margin-bottom: 18px; }
  .wa-card-h { padding: 12px 16px; border-bottom: 1px solid var(--apc-stone-200); display: flex; justify-content: space-between; align-items: center; }
  .wa-card-h h2 { font-size: 14px; margin: 0; font-weight: 600; color: var(--apc-green); text-transform: uppercase; letter-spacing: 0.4px; }
  .wa-card-b { padding: 14px 16px; }
  table.wa-tbl { width: 100%; border-collapse: collapse; }
  table.wa-tbl th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--apc-stone-600); padding: 8px 10px; border-bottom: 1px solid var(--apc-stone-200); background: var(--apc-stone-50); }
  table.wa-tbl td { padding: 10px; border-bottom: 1px solid var(--apc-stone-200); font-size: 13px; vertical-align: top; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .pill.sent { background: #e5f3eb; color: var(--apc-green); }
  .pill.delivered { background: #d2ebd9; color: var(--apc-green); }
  .pill.read { background: #fff3c0; color: #8a6a00; }
  .pill.failed { background: #fde0e0; color: var(--apc-red); }
  .pill.received { background: #e2eaf3; color: #1a4079; }
  .pill.queued { background: #eee; color: #555; }
  .pill.in { background: #e2eaf3; color: #1a4079; }
  .pill.out { background: #e5f3eb; color: var(--apc-green); }
  .pill.draft { background: #eee; color: #555; }
  .pill.pending { background: #fff3c0; color: #8a6a00; }
  .pill.approved { background: #d2ebd9; color: var(--apc-green); }
  .pill.rejected { background: #fde0e0; color: var(--apc-red); }
  form.wa-send { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 10px; align-items: end; }
  form.wa-send label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--apc-stone-600); display: block; margin-bottom: 4px; }
  form.wa-send input, form.wa-send select { width: 100%; padding: 8px 10px; border: 1px solid var(--apc-stone-200); border-radius: 6px; font-size: 13px; font-family: inherit; }
  form.wa-send button { padding: 10px 16px; background: var(--apc-green); color: #fff; border: 0; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; }
  form.wa-send button:disabled { opacity: 0.5; cursor: not-allowed; }
  .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
  .alert-ok { background: #e5f3eb; color: var(--apc-green); border-left: 3px solid var(--apc-green); }
  .alert-bad { background: #fde0e0; color: var(--apc-red); border-left: 3px solid var(--apc-red); }
  .alert-warn { background: #fff7d6; color: #8a6a00; border-left: 3px solid var(--apc-gold); }
  .muted { color: var(--apc-stone-600); font-size: 12px; }
  code { background: var(--apc-stone-50); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .empty { padding: 32px; text-align: center; color: var(--apc-stone-600); font-size: 13px; }
  @media (max-width: 700px) {
    .wa-stats { grid-template-columns: repeat(2, 1fr); }
    form.wa-send { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wa-bar">
  <div>
    <h1 id="wa-brand">WhatsApp Delivery</h1>
    <span class="muted" style="opacity:0.85; font-size:12px;" id="wa-tenant-name">…</span>
  </div>
  <div class="right">
    <a href="admin.html">← Admin</a>
    <a href="index.html">Beta home</a>
    <span class="badge">Platform v1.0</span>
  </div>
</div>

<div class="wa-wrap" id="wa-wrap">
  <div class="empty" id="wa-loading">Loading…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  const TENANT_SLUG = "apc"; // white-label: change per deployment
  const $ = (q) => document.querySelector(q);
  const esc = (s) => (s == null ? "" : String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])));
  const sb = window.supabaseClient;

  let tenant = null;
  let primaryNumber = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      $("#wa-wrap").innerHTML = `<div class="alert alert-bad">Not signed in. <a href="admin.html">Sign in</a> first.</div>`;
      return;
    }
    if (!window.APC_CONFIG.ADMIN_EMAILS.includes((session.user.email || "").toLowerCase())) {
      $("#wa-wrap").innerHTML = `<div class="alert alert-bad">${esc(session.user.email)} isn't on the admin list.</div>`;
      return;
    }

    // Load tenant
    const { data: t } = await sb.from("wa_tenants").select("*").eq("slug", TENANT_SLUG).single();
    if (!t) {
      $("#wa-wrap").innerHTML = `<div class="alert alert-bad">Tenant <code>${TENANT_SLUG}</code> not found. The platform schema may not be deployed.</div>`;
      return;
    }
    tenant = t;
    $("#wa-tenant-name").textContent = t.display_name;
    document.documentElement.style.setProperty("--apc-green", t.brand_primary_hex || "#006633");
    document.documentElement.style.setProperty("--apc-gold", t.brand_accent_hex || "#FFCC00");

    // Load primary number
    const { data: nums } = await sb.from("wa_numbers").select("*").eq("tenant_id", t.id).eq("is_primary", true).limit(1);
    primaryNumber = nums?.[0] || null;

    await render();
  }

  async function render() {
    const [{ data: msgs }, { data: tpls }, { data: contacts }] = await Promise.all([
      sb.from("wa_messages").select("*").eq("tenant_id", tenant.id).order("created_at", { ascending: false }).limit(50),
      sb.from("wa_templates").select("*").eq("tenant_id", tenant.id).order("key"),
      sb.from("wa_contacts").select("*").eq("tenant_id", tenant.id).order("created_at", { ascending: false }).limit(20),
    ]);

    const stats = {
      total: msgs?.length || 0,
      sent: (msgs || []).filter(m => m.direction === "outbound" && ["sent","delivered","read"].includes(m.status)).length,
      received: (msgs || []).filter(m => m.direction === "inbound").length,
      contacts: contacts?.length || 0,
    };

    let html = "";

    if (!primaryNumber) {
      html += `<div class="alert alert-warn">
        <strong>Not yet live.</strong> No WhatsApp number is wired to this tenant.
        Once Dave buys the UK virtual number and completes Meta Business verification,
        the <code>phone_number_id</code> from Meta will be added to <code>wa_numbers</code>
        and sending will activate. The schema, edge functions, and templates are all ready.
      </div>`;
    }

    html += `
      <div class="wa-stats">
        <div class="wa-stat"><div class="num">${stats.total}</div><div class="lbl">Messages (last 50)</div></div>
        <div class="wa-stat"><div class="num">${stats.sent}</div><div class="lbl">Outbound delivered</div></div>
        <div class="wa-stat"><div class="num">${stats.received}</div><div class="lbl">Inbound</div></div>
        <div class="wa-stat"><div class="num">${stats.contacts}</div><div class="lbl">Contacts</div></div>
      </div>

      <div class="wa-card">
        <div class="wa-card-h"><h2>Send a templated message</h2></div>
        <div class="wa-card-b">
          <div id="send-msg"></div>
          <form class="wa-send" id="send-form" ${!primaryNumber ? "data-disabled='1'" : ""}>
            <div>
              <label>Template</label>
              <select id="f-template" required>
                <option value="">Select…</option>
                ${(tpls || []).map(t => `<option value="${esc(t.key)}" data-vars='${esc(JSON.stringify(t.variables||[]))}'>${esc(t.key)} ${t.meta_status !== "approved" ? "(" + t.meta_status + ")" : ""}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>To (E.164, no +)</label>
              <input id="f-to" type="text" placeholder="447777123456" required pattern="[0-9]{8,15}">
            </div>
            <div>
              <label>Variables (comma-separated, in order)</label>
              <input id="f-vars" type="text" placeholder="e.g. Joe, https://beta.algarvepropertycompliance.com">
            </div>
            <div style="grid-column: 1 / -1;">
              <button type="submit" ${!primaryNumber ? "disabled" : ""}>Send via WhatsApp</button>
              <span class="muted" style="margin-left:10px;">Template needs Meta-approved status to actually send.</span>
            </div>
          </form>
        </div>
      </div>

      <div class="wa-card">
        <div class="wa-card-h"><h2>Templates</h2><span class="muted">${(tpls || []).length} configured</span></div>
        <table class="wa-tbl">
          <thead><tr><th>Key</th><th>Meta name</th><th>Category</th><th>Status</th><th>Body</th></tr></thead>
          <tbody>
            ${(tpls || []).map(t => `
              <tr>
                <td><strong>${esc(t.key)}</strong></td>
                <td><code>${esc(t.meta_name)}</code></td>
                <td>${esc(t.category)}</td>
                <td><span class="pill ${esc(t.meta_status)}">${esc(t.meta_status)}</span></td>
                <td style="max-width:380px;">${esc(t.body_text)}</td>
              </tr>`).join("") || `<tr><td colspan="5" class="empty">No templates yet.</td></tr>`}
          </tbody>
        </table>
      </div>

      <div class="wa-card">
        <div class="wa-card-h"><h2>Recent messages</h2><span class="muted">last 50</span></div>
        <table class="wa-tbl">
          <thead><tr><th>When</th><th>Dir</th><th>Status</th><th>Template</th><th>Body</th></tr></thead>
          <tbody>
            ${(msgs || []).map(m => `
              <tr>
                <td>${esc(new Date(m.created_at).toLocaleString("en-GB"))}</td>
                <td><span class="pill ${m.direction === "inbound" ? "in" : "out"}">${m.direction === "inbound" ? "IN" : "OUT"}</span></td>
                <td><span class="pill ${esc(m.status)}">${esc(m.status)}</span></td>
                <td>${esc(m.template_key || "—")}</td>
                <td style="max-width:420px;">${esc(m.body_text || "")}${m.error_text ? `<br><small style='color:#D90708;'>${esc(m.error_text)}</small>` : ""}</td>
              </tr>`).join("") || `<tr><td colspan="5" class="empty">No messages yet — send your first when the number goes live.</td></tr>`}
          </tbody>
        </table>
      </div>

      <div class="wa-card">
        <div class="wa-card-h"><h2>Contacts</h2><span class="muted">${stats.contacts} known</span></div>
        <table class="wa-tbl">
          <thead><tr><th>Phone</th><th>Name</th><th>Opted in</th><th>External ref</th><th>Last seen</th></tr></thead>
          <tbody>
            ${(contacts || []).map(c => `
              <tr>
                <td>${esc(c.display_phone || "+" + c.wa_id)}</td>
                <td>${esc(c.full_name || "—")}</td>
                <td>${c.opted_in_at ? "✓" : (c.opted_out_at ? "✗" : "—")}</td>
                <td>${esc(c.external_ref || "—")}</td>
                <td>${c.last_seen_at ? esc(new Date(c.last_seen_at).toLocaleString("en-GB")) : "—"}</td>
              </tr>`).join("") || `<tr><td colspan="5" class="empty">No contacts yet.</td></tr>`}
          </tbody>
        </table>
      </div>

      <p class="muted" style="text-align:center; margin-top: 24px;">
        APC remains portable and is not dependent on PC as the only execution agent.
      </p>
    `;

    $("#wa-wrap").innerHTML = html;

    const form = $("#send-form");
    if (form && primaryNumber) {
      form.addEventListener("submit", onSend);
    }
  }

  async function onSend(e) {
    e.preventDefault();
    const tpl = $("#f-template").value;
    const to = $("#f-to").value.trim();
    const vars = $("#f-vars").value.trim().split(",").map(s => s.trim()).filter(Boolean);

    $("#send-msg").innerHTML = `<div class="alert alert-warn">Sending…</div>`;

    const { data: { session } } = await sb.auth.getSession();
    const resp = await fetch(`${window.APC_CONFIG.SUPABASE_URL}/functions/v1/wa-send`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({
        tenant_slug: TENANT_SLUG,
        to,
        template_key: tpl,
        variables: vars,
      }),
    });
    const json = await resp.json();
    if (json.ok) {
      $("#send-msg").innerHTML = `<div class="alert alert-ok">Sent · wamid <code>${esc(json.wamid || "")}</code></div>`;
      setTimeout(render, 800);
    } else {
      $("#send-msg").innerHTML = `<div class="alert alert-bad">Failed: <code>${esc(JSON.stringify(json.error))}</code></div>`;
    }
  }

  init();
</script>
</body>
</html>
